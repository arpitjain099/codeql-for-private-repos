name: Feature request
description: Suggest a new integration, output channel, or capability.
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the use case?
      description: What are you trying to do that the project doesn't currently let you do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What inputs / outputs / behavior would you want? A YAML sketch helps.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and ruled out.
